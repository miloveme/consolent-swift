name: Consolent
options:
  bundleIdPrefix: com.consolent
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  groupSortPosition: top

packages:
  Vapor:
    url: https://github.com/vapor/vapor.git
    from: "4.92.0"
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: "1.2.0"

targets:
  Consolent:
    type: application
    platform: macOS
    sources:
      - path: Consolent
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.consolent.app
        MARKETING_VERSION: "0.1.7"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: Consolent/Info.plist
        CODE_SIGN_ENTITLEMENTS: Consolent/Consolent.entitlements
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        DEAD_CODE_STRIPPING: YES
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        ENABLE_APP_SANDBOX: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: Vapor
        product: Vapor
      - package: SwiftTerm
        product: SwiftTerm
    entitlements:
      path: Consolent/Consolent.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.server: true
        com.apple.security.network.client: true

  ConsolentTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ConsolentTests
    settings:
      base:
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Consolent
